<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Slider</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="title">
            <p>Price Slider</p>
        </div>
        <div class="custom-wrapper">
            <div class="header">
                <h2 class="projtitle">Price Range Slider</h2>
            </div>

            <!-- price input fields -->
            <div class="price-input-container">
                <div class="price-input">
                    <div class="price-field">
                        <span>Minimum Price</span>
                        <input type="number" class="min-input" value="2500" placeholder="Minimum Price">
                    </div>
                    <div class="price-field">
                        <span>Maximum Price</span>
                        <input type="number" class="max-input" value="8500" placeholder="Maximum Price">
                    </div>
                </div>
                <div class="slider">
                    <div class="price-slider"></div>
                </div>
            </div>
            <!-- Slider -->
            <div class="range-input">
                <input type="range" class="min-range" min="0" max="10000" value="2500" step="1" aria-label="Minimum price range">
                <input type="range" class="max-range" min="0" max="10000" value="8500" step="1" aria-label="Maximum price range">
            </div>
        </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
